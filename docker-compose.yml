services:

  api:
    build:
      context: .
      dockerfile: ./EmployeeManagement/Dockerfile
    ports:
      - "5000:80"
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"